# Design Tokens Audit Configuration

# Directory to scan (relative to project root)
SCAN_DIR=.

# Comma-separated file extensions to scan
FILE_TYPES=svelte,vue,jsx,tsx,html,css,scss,less

# Comma-separated color values that are OK to hardcode (case-insensitive)
ALLOWED_HARDCODED=white,black,transparent,inherit,currentColor,none
