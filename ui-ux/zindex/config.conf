# Z-Index Audit Configuration
# Edit these values to match your project. The audit script reads this file
# automatically. If this file is missing, sensible defaults are used.

# Directory to scan (relative to project root)
SCAN_DIR=.

# Comma-separated file extensions to scan (no dots)
FILE_TYPES=svelte,vue,jsx,tsx,html,css,scss,less

# Comma-separated valid z-index values (your project's z-index scale)
VALID_ZINDEX=1,10,90,99,1000,2000,9999,10000

# Case-insensitive pattern to identify header files (basename match).
# Sticky elements in files matching this pattern are allowed to use high z-index.
HEADER_PATTERN=header
