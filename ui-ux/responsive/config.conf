# Responsive Design Audit Configuration

# Directory to scan (relative to project root)
SCAN_DIR=.

# Comma-separated file extensions to scan
FILE_TYPES=svelte,vue,jsx,tsx,html,css,scss,less

# Expected breakpoints in pixels (comma-separated)
# The audit flags media queries with values not in this list
EXPECTED_BREAKPOINTS=480,580,600,640,768,900,1024,1280
