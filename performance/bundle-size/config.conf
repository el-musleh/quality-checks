# Bundle Size Audit Configuration

# Build output directory (relative to project root)
BUILD_DIR=dist

# Warn if any single file exceeds this size in KB
WARN_FILE_KB=500

# Warn if total bundle exceeds this size in KB
WARN_TOTAL_KB=2000

# Glob pattern for files to exclude from size checks (e.g. source maps)
EXCLUDE_PATTERN=*.map
